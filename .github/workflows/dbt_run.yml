name: dbt pipeline

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  run-dbt:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          pip install dbt-bigquery

      - name: Create GCP credentials file
        env:
          BIGQUERY_KEY: ${{ secrets.BIGQUERY_KEY }}
        run: |
          echo "$BIGQUERY_KEY" > /tmp/keyfile.json

      # ✅ Usamos TEMPLATE correctamente
      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cp saas_dbt/profiles.yml.template ~/.dbt/profiles.yml

      # ✅ (opcional pero muy recomendable) DEBUG para confirmar dataset
      - name: Debug profile
        run: |
          cat ~/.dbt/profiles.yml

      - name: Run dbt pipeline
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/keyfile.json
        run: |
          cd saas_dbt
          dbt deps
          dbt build --target dev
