version: 2

models:
  - name: stg_events
    description: "Cleaned events dataset with normalized event types"

    columns:
      - name: user_id
        description: "Unique user identifier"
        tests:
          - not_null

      - name: event_type
        description: >
          Normalized event type grouped into:
          - signup
          - create_project
          - other
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['signup', 'create_project', 'other']

      - name: event_date
        description: "Date when the event occurred"
        tests:
          - not_null